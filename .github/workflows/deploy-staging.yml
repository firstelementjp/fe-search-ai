name: Deploy to Staging

on:
    push:
        branches: [main, develop]
    workflow_dispatch:
        inputs:
            environment:
                description: 'Target environment'
                required: true
                default: 'staging'
                type: choice
                options:
                    - staging
                    - production

permissions:
    contents: read

concurrency:
    group: deploy-${{ github.ref }}-${{ github.event.inputs.environment || 'staging' }}
    cancel-in-progress: true

jobs:
    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        # Temporarily disabled - no staging environment available
        if: false

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install PHP dependencies
              run: composer install --no-dev --prefer-dist

            - name: Install Node dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Create deployment package
              run: |
                  rm -rf deploy
                  mkdir -p deploy

                  # Create release tree from git (respects .gitattributes export-ignore).
                  git archive --format=tar --prefix=fe-search-ai/ --worktree-attributes HEAD | tar -x -C deploy

                  # Copy vendor directory (required for WordPress plugin).
                  cp -r vendor deploy/fe-search-ai/

                  # Copy built/minified assets from working directory into the release tree.
                  mkdir -p deploy/fe-search-ai/assets/js
                  mkdir -p deploy/fe-search-ai/assets/css
                  cp -f assets/js/*.min.js deploy/fe-search-ai/assets/js/ || true
                  cp -f assets/css/*.min.css deploy/fe-search-ai/assets/css/ || true

                  # Create zip file for deployment.
                  cd deploy
                  zip -r fe-search-ai.zip fe-search-ai

            - name: Deploy to staging server via SSH
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.STAGING_HOST }}
                  username: ${{ secrets.STAGING_USER }}
                  key: ${{ secrets.STAGING_SSH_KEY }}
                  source: 'deploy/fe-search-ai.zip'
                  target: '/tmp/'
                  strip_components: 1

            - name: Extract and install plugin on staging
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.STAGING_HOST }}
                  username: ${{ secrets.STAGING_USER }}
                  key: ${{ secrets.STAGING_SSH_KEY }}
                  script: |
                      # Backup existing plugin.
                      if [ -d "${{ secrets.STAGING_WP_PATH }}/wp-content/plugins/fe-search-ai" ]; then
                        sudo mv "${{ secrets.STAGING_WP_PATH }}/wp-content/plugins/fe-search-ai" "${{ secrets.STAGING_WP_PATH }}/wp-content/plugins/fe-search-ai.backup.$(date +%Y%m%d_%H%M%S)"
                      fi

                      # Extract new plugin.
                      cd /tmp/
                      unzip -q fe-search-ai.zip -d "${{ secrets.STAGING_WP_PATH }}/wp-content/plugins/"

                      # Set correct permissions.
                      sudo chown -R ${{ secrets.STAGING_USER }}:${{ secrets.STAGING_WEB_USER }} "${{ secrets.STAGING_WP_PATH }}/wp-content/plugins/fe-search-ai"
                      sudo chmod -R 755 "${{ secrets.STAGING_WP_PATH }}/wp-content/plugins/fe-search-ai"

                      # Clear WordPress cache if WP-CLI is available.
                      if command -v wp &> /dev/null; then
                        cd ${{ secrets.STAGING_WP_PATH }}
                        wp cache flush
                        wp plugin activate fe-search-ai
                      fi

                      echo "Deployment completed successfully!"

    deploy-production:
        name: Deploy to Production
        runs-on: ubuntu-latest
        # Temporarily disabled - no production environment available
        if: false

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install PHP dependencies
              run: composer install --no-dev --prefer-dist

            - name: Install Node dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Create deployment package
              run: |
                  rm -rf deploy
                  mkdir -p deploy

                  # Create release tree from git (respects .gitattributes export-ignore).
                  git archive --format=tar --prefix=fe-search-ai/ --worktree-attributes HEAD | tar -x -C deploy

                  # Copy vendor directory (required for WordPress plugin).
                  cp -r vendor deploy/fe-search-ai/

                  # Copy built/minified assets from working directory into the release tree.
                  mkdir -p deploy/fe-search-ai/assets/js
                  mkdir -p deploy/fe-search-ai/assets/css
                  cp -f assets/js/*.min.js deploy/fe-search-ai/assets/js/ || true
                  cp -f assets/css/*.min.css deploy/fe-search-ai/assets/css/ || true

                  # Create zip file for deployment.
                  cd deploy
                  zip -r fe-search-ai.zip fe-search-ai

            - name: Deploy to production server via SSH
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.PRODUCTION_HOST }}
                  username: ${{ secrets.PRODUCTION_USER }}
                  key: ${{ secrets.PRODUCTION_SSH_KEY }}
                  source: 'deploy/fe-search-ai.zip'
                  target: '/tmp/'
                  strip_components: 1

            - name: Extract and install plugin on production
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.PRODUCTION_HOST }}
                  username: ${{ secrets.PRODUCTION_USER }}
                  key: ${{ secrets.PRODUCTION_SSH_KEY }}
                  script: |
                      # Backup existing plugin.
                      if [ -d "${{ secrets.PRODUCTION_WP_PATH }}/wp-content/plugins/fe-search-ai" ]; then
                        sudo mv "${{ secrets.PRODUCTION_WP_PATH }}/wp-content/plugins/fe-search-ai" "${{ secrets.PRODUCTION_WP_PATH }}/wp-content/plugins/fe-search-ai.backup.$(date +%Y%m%d_%H%M%S)"
                      fi

                      # Extract new plugin.
                      cd /tmp/
                      unzip -q fe-search-ai.zip -d "${{ secrets.PRODUCTION_WP_PATH }}/wp-content/plugins/"

                      # Set correct permissions.
                      sudo chown -R ${{ secrets.PRODUCTION_USER }}:${{ secrets.PRODUCTION_WEB_USER }} "${{ secrets.PRODUCTION_WP_PATH }}/wp-content/plugins/fe-search-ai"
                      sudo chmod -R 755 "${{ secrets.PRODUCTION_WP_PATH }}/wp-content/plugins/fe-search-ai"

                      # Clear WordPress cache if WP-CLI is available.
                      if command -v wp &> /dev/null; then
                        cd ${{ secrets.PRODUCTION_WP_PATH }}
                        wp cache flush
                        wp plugin activate fe-search-ai
                      fi

                      echo "Production deployment completed successfully!"
