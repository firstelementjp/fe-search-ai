name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: |
                  if npm run | grep -q "build"; then
                    npm run build
                  fi

            - name: Create release zip
              run: |
                  # Create release directory
                  mkdir -p release

                  # Copy plugin files (excluding development files)
                  rsync -av --exclude-from=.deployignore \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='node_modules' \
                    --exclude='vendor' \
                    --exclude='*.log' \
                    --exclude='.envrc*' \
                    --exclude='tests' \
                    --exclude='*.md' \
                    --exclude='package*.json' \
                    --exclude='composer.lock' \
                    --exclude='phpcs.xml.dist' \
                    --exclude='.eslintrc.json' \
                    --exclude='.prettierrc*' \
                    --exclude='.gitignore' \
                    --exclude='LICENSE' \
                    . release/fe-search-ai/
                    
                  # Create zip file
                  cd release
                  zip -r fe-search-ai-${{ github.ref_name }}.zip fe-search-ai/

            - name: Generate changelog
              id: changelog
              run: |
                  # Get previous tag
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

                  if [ -n "$PREVIOUS_TAG" ]; then
                    echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
                    echo "## Changes since $PREVIOUS_TAG" >> $GITHUB_OUTPUT
                    git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  else
                    echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
                    echo "## Initial Release" >> $GITHUB_OUTPUT
                    echo "First release of FE Search AI plugin" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  fi

            - name: Create GitHub Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  release_name: FE Search AI ${{ github.ref_name }}
                  body: |
                      ${{ steps.changelog.outputs.CHANGELOG }}

                      ## Installation

                      1. Download the zip file below
                      2. Upload to your WordPress plugins directory
                      3. Activate the plugin in WordPress

                  draft: false
                  prerelease: false

            - name: Upload Release Asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./release/fe-search-ai-${{ github.ref_name }}.zip
                  asset_name: fe-search-ai-${{ github.ref_name }}.zip
                  asset_content_type: application/zip

    deploy-to-svn:
        name: Deploy to WordPress.org SVN
        runs-on: ubuntu-latest
        needs: create-release
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: |
                  if npm run | grep -q "build"; then
                    npm run build
                  fi

            - name: Deploy to WordPress.org
              uses: 10up/action-wordpress-plugin-deploy@stable
              env:
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: fe-search-ai
