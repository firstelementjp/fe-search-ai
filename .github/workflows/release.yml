name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup PHP
              uses: shivammathur/setup-php@2.37.1
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node dependencies
              run: npm ci

            - name: Build frontend assets
              run: |
                  npm install --silent
                  if npm run | grep -q "build"; then
                      npm run build --silent
                  fi

            - name: Create ZIP
              id: create_zip
              run: |
                  rm -rf release
                  mkdir -p release
                  ZIP_VERSION="${GITHUB_REF_NAME#v}"
                  ZIP_FILE="fe-search-ai-${ZIP_VERSION}.zip"

                  # Create release tree from git archive (respects .gitattributes export-ignore).
                  git archive --format=tar --prefix=fe-search-ai/ --worktree-attributes ${{ github.ref_name }} | tar -x -C release

                  # Remove development files explicitly (additional safety).
                  rm -rf release/fe-search-ai/tests
                  rm -rf release/fe-search-ai/docs
                  rm -f release/fe-search-ai/SECURITY.md
                  rm -f release/fe-search-ai/CONTRIBUTING.md
                  rm -f release/fe-search-ai/wp_tests_config.php.example
                  rm -f release/fe-search-ai/phpunit.xml

                  # Install dependencies (no-dev) in release tree.
                  cp composer.json composer.lock release/fe-search-ai/
                  cd release/fe-search-ai
                  composer install --no-dev --prefer-dist --quiet

                  # Remove vendor development files.
                  find vendor -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
                  find vendor -type d -name ".github" -exec rm -rf {} + 2>/dev/null || true
                  find vendor -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
                  find vendor -name "phpunit.xml*" -delete 2>/dev/null || true
                  find vendor -name "phpcs.xml*" -delete 2>/dev/null || true
                  find vendor -name ".phpcs*" -delete 2>/dev/null || true
                  find vendor -name "phpstan*" -delete 2>/dev/null || true
                  find vendor -name "psalm*" -delete 2>/dev/null || true
                  find vendor -name "infection*" -delete 2>/dev/null || true
                  find vendor -name "scrutinizer*" -delete 2>/dev/null || true
                  find vendor -name "Makefile" -delete 2>/dev/null || true
                  find vendor -name "README.md" -delete 2>/dev/null || true
                  find vendor -name "CHANGELOG.md" -delete 2>/dev/null || true
                  find vendor -name "CONTRIBUTING.md" -delete 2>/dev/null || true
                  find vendor -name "SECURITY.md" -delete 2>/dev/null || true
                  find vendor -name ".gitignore" -delete 2>/dev/null || true

                  cd - > /dev/null

                  # Copy built/minified assets from working directory into the release tree.
                  mkdir -p release/fe-search-ai/assets/js
                  cp -f assets/js/*.min.js release/fe-search-ai/assets/js/ || true
                  if [ -d "assets/css" ]; then
                      mkdir -p release/fe-search-ai/assets/css
                      cp -f assets/css/*.min.css release/fe-search-ai/assets/css/ || true
                  fi

                  # Copy vendor assets (Pickr color picker).
                  if [ -d "assets/vendor" ]; then
                      mkdir -p release/fe-search-ai/assets/vendor
                      cp -r assets/vendor/* release/fe-search-ai/assets/vendor/
                  fi

                  # Security checks in release tree.
                  echo "=== Security checks in release tree ==="
                  UNDERSCORE_COUNT=$(find release/fe-search-ai -name "_*" | wc -l | tr -d ' ')
                  echo "Files starting with underscore: $UNDERSCORE_COUNT"
                  if [ "$UNDERSCORE_COUNT" -gt 0 ]; then
                      echo "ERROR: Found files starting with underscore"
                      find release/fe-search-ai -name "_*"
                      exit 1
                  fi

                  DOT_COUNT=$(find release/fe-search-ai -name ".*" -not -path "*/vendor/*" | wc -l | tr -d ' ')
                  echo "Files starting with dot (excluding vendor): $DOT_COUNT"
                  if [ "$DOT_COUNT" -gt 0 ]; then
                      echo "ERROR: Found files starting with dot"
                      find release/fe-search-ai -name ".*" -not -path "*/vendor/*"
                      exit 1
                  fi

                  # Sanity checks in release tree.
                  echo "=== Sanity checks in release tree ==="
                  if [ ! -d "release/fe-search-ai/vendor" ]; then
                      echo "ERROR: Vendor directory does not exist"
                      exit 1
                  fi
                  if [ ! -d "release/fe-search-ai/vendor/wamania/php-stemmer/src/Stemmer" ]; then
                      echo "ERROR: php-stemmer library does not exist"
                      exit 1
                  fi
                  if [ ! -f "release/fe-search-ai/vendor/u7aro/tinysegmenter-php/src/TinySegmenter.php" ]; then
                      echo "ERROR: TinySegmenter library does not exist"
                      exit 1
                  fi

                  # Create zip file.
                  cd release
                  zip -r "../${ZIP_FILE}" fe-search-ai -q
                  cd - > /dev/null

                  echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ steps.create_zip.outputs.zip_file }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false

    deploy-to-svn:
        name: Deploy to WordPress.org SVN
        runs-on: ubuntu-latest
        needs: create-release
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@2.37.1
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node dependencies
              run: npm ci

            - name: Build frontend assets
              run: |
                  npm install --silent
                  if npm run | grep -q "build"; then
                      npm run build --silent
                  fi

            - name: Deploy to WordPress.org
              uses: 10up/action-wordpress-plugin-deploy@stable
              env:
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: fe-search-ai
