name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install PHP dependencies
              run: composer install --no-dev --prefer-dist

            - name: Install Node dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Create ZIP
              id: create_zip
              run: |
                  rm -rf release
                  mkdir -p release
                  ZIP_VERSION="${GITHUB_REF_NAME#v}"
                  ZIP_FILE="fe-search-ai-${ZIP_VERSION}.zip"

                  # Create release tree from git (respects .gitattributes export-ignore).
                  git archive --format=tar --prefix=fe-search-ai/ --worktree-attributes ${{ github.ref_name }} | tar -x -C release

                  # Copy vendor directory (required for WordPress plugin).
                  cp -r vendor release/fe-search-ai/

                  # Copy built/minified assets from working directory into the release tree.
                  mkdir -p release/fe-search-ai/assets/js
                  mkdir -p release/fe-search-ai/assets/css
                  cp -f assets/js/*.min.js release/fe-search-ai/assets/js/ || true
                  cp -f assets/css/*.min.css release/fe-search-ai/assets/css/ || true

                  cd release
                  rm -f ../${ZIP_FILE}
                  zip -r ../${ZIP_FILE} fe-search-ai

                  echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

            - name: Security checks on release tree
              run: |
                  echo "=== Security checks in release tree ==="
                  echo "Files starting with underscore (should be 0):"
                  UNDERSCORE_COUNT=$(find release/fe-search-ai -name "_*" | wc -l)
                  echo "$UNDERSCORE_COUNT"
                  if [ "$UNDERSCORE_COUNT" -gt 0 ]; then
                      echo "ERROR: Found files starting with underscore:"
                      find release/fe-search-ai -name "_*"
                      exit 1
                  fi

                  echo "Files starting with dot (should be 0):"
                  DOT_COUNT=$(find release/fe-search-ai -name ".*" | wc -l)
                  echo "$DOT_COUNT"
                  if [ "$DOT_COUNT" -gt 0 ]; then
                      echo "ERROR: Found files starting with dot:"
                      find release/fe-search-ai -name ".*"
                      exit 1
                  fi

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ steps.create_zip.outputs.zip_file }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false

    deploy-to-svn:
        name: Deploy to WordPress.org SVN
        runs-on: ubuntu-latest
        needs: create-release
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install PHP dependencies
              run: composer install --no-dev --prefer-dist

            - name: Install Node dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Deploy to WordPress.org
              uses: 10up/action-wordpress-plugin-deploy@stable
              env:
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: fe-search-ai
